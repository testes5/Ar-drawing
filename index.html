<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Ar drawing Free!!</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height:100vh;
      background: linear-gradient(to bottom, #e3f2fd, #bbdefb);
      font-family: system-ui, -apple-system, sans-serif;
      overflow:hidden;
    }

    /* Loading Screen */
    #loading {
      position:fixed;
      inset:0;
      background: linear-gradient(to bottom, #e3f2fd, #bbdefb);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      padding-bottom: 60px;
      z-index:100;
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    #loading.hidden {
      opacity:0;
      transform:scale(0.9);
      pointer-events:none;
    }

    .illustration {
      width: 90%;
      max-width: 320px;
      margin-bottom: 30px;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .title-loading {
      font-size: 2.4rem;
      font-weight:700;
      color:#000;
      margin-bottom: 25px;
      text-align: center;
    }

    .progress-container {
      width:88%;
      max-width:360px;
      height:18px;
      background:rgba(255,255,255,0.55);
      border-radius:9px;
      overflow:hidden;
      box-shadow:0 8px 25px rgba(0,0,0,0.15);
      margin-bottom: 18px;
    }

    .progress-bar {
      width:0%;
      height:100%;
      background:linear-gradient(to right, #2196f3, #64b5f6);
      border-radius:9px;
      transition:width 0.5s ease;
      box-shadow:0 0 25px #2196f3cc;
    }

    .percent {
      font-size:2rem;
      font-weight:600;
      color:#333;
      margin-bottom: 50px;
    }

    /* Main Content */
    #main {
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      opacity:0;
      transition:opacity 1.4s ease 0.8s;
    }

    #main.visible {
      opacity:1;
    }

    header {
      width:100%;
      background:rgba(255,255,255,0.96);
      backdrop-filter:blur(14px);
      padding:18px;
      text-align:center;
      font-size:2.1rem;
      font-weight:700;
      color:#000;
      position:fixed;
      top:0;
      z-index:20;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .frame {
      width:94%;
      max-width:420px; /* aumentado pra não ficar pequeno/lado vazio */
      height:calc(100vh - 80px);
      margin-top:80px;
      background:#fff;
      border-radius:36px;
      overflow:hidden;
      box-shadow:0 30px 80px rgba(0,0,0,0.2);
      position:relative;
    }

    .paper {
      position:absolute;
      inset:0;
      background:#fff;
      background-image: 
        linear-gradient(rgba(0,0,0,0.008) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.008) 1px, transparent 1px);
      background-size:28px 28px; /* grid mais espaçado e sutil */
      z-index:1;
    }

    .overlay {
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }

    #img {
      max-width:95%;
      max-height:80%;
      object-fit:contain;
      opacity:0.72;
      transition:opacity 0.5s ease;
    }

    .import-zone {
      position:relative;
      z-index:10;
      width:85%;
      padding:55px 35px;
      background:#e8f4fd;
      border:4px dashed #fff;
      border-radius:32px;
      text-align:center;
      cursor:pointer;
      transition:all 0.4s ease;
      box-shadow:0 12px 40px rgba(0,0,0,0.14);
      margin:auto;
    }

    .import-zone:hover {
      background:#d1e8ff;
      transform:translateY(-8px);
      box-shadow:0 20px 60px rgba(0,0,0,0.22);
    }

    .import-zone h1 {
      font-size:2.2rem;
      margin-bottom:18px;
      color:#000;
    }

    .import-zone p {
      font-size:1.2rem;
      color:#444;
      line-height:1.5;
    }

    input[type="file"] { display:none; }

    .controls {
      position:absolute;
      bottom:40px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.65);
      color:#fff;
      padding:14px 28px;
      border-radius:999px;
      font-size:1.05rem;
      display:none;
      align-items:center;
      gap:18px;
      backdrop-filter:blur(10px);
    }

    #opacidade { width:200px; accent-color:#fff; }
  </style>
</head>
<body>

  <!-- Loading Screen com imagem corrigida -->
  <div id="loading">
    <img src="https://arteasy.app/_next/image?url=%2F_next%2Fstatic%2Fmedia%2Fhero.688a90f37e977e2900145202.webp&w=1920&q=75" alt="Mão desenhando com AR no papel usando celular" class="illustration">
    <div class="title-loading">Ar drawing Free!!</div>
    <div class="progress-container">
      <div class="progress-bar" id="bar"></div>
    </div>
    <div class="percent" id="percent">0%</div>
  </div>

  <!-- Main App -->
  <div id="main">
    <header>Ar drawing Free!!</header>

    <div class="frame">
      <div class="paper"></div>
      <div class="overlay">
        <img id="img" src="" alt="Imagem para traçar" />
      </div>

      <label for="file" class="import-zone" id="zone">
        <h1>Import Image here!</h1>
        <p>Toque para escolher uma foto da galeria e traçar no AR</p>
      </label>

      <input type="file" id="file" accept="image/*">

      <div class="controls" id="ctrls">
        Opacidade:
        <input type="range" id="opacidade" min="0.2" max="1" step="0.05" value="0.72">
      </div>
    </div>
  </div>

  <script>
    // Loading lento
    const loading = document.getElementById('loading');
    const bar = document.getElementById('bar');
    const percent = document.getElementById('percent');
    const main = document.getElementById('main');

    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 5 + 3; // ainda mais lento
      if (progress > 100) progress = 100;
      bar.style.width = progress + '%';
      percent.textContent = Math.round(progress) + '%';

      if (progress >= 100) {
        clearInterval(interval);
        setTimeout(() => {
          loading.classList.add('hidden');
          setTimeout(() => {
            main.classList.add('visible');
          }, 1200);
        }, 1000);
      }
    }, 300); // ~7-10 segundos agora

    // Importar imagem
    const fileInput = document.getElementById('file');
    const imgEl = document.getElementById('img');
    const zone = document.getElementById('zone');
    const ctrls = document.getElementById('ctrls');
    const opacidade = document.getElementById('opacidade');

    zone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          imgEl.src = ev.target.result;
          zone.style.display = 'none';
          ctrls.style.display = 'flex';
        };
        reader.readAsDataURL(file);
      }
    });

    opacidade.addEventListener('input', (e) => {
      imgEl.style.opacity = e.target.value;
    });
  </script>

</body>
</html>
